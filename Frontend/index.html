<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WorkEval – Employee Assessment</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">📋</span>
        <h1>WorkEval</h1>
        <p>Employee Assessment Portal</p>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>Login as</label>
          <select id="login-role">
            <option value="employee">Employee</option>
            <option value="admin">Admin / HR</option>
          </select>
        </div>
        <button class="btn-primary" onclick="login()">Login</button>
        <div id="login-msg" class="msg"></div>
      </div>

      <!-- Register Form -->
      <div id="register-form" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Jane Smith" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>Department</label>
          <input type="text" id="reg-dept" placeholder="Engineering" />
        </div>
        <button class="btn-primary" onclick="register()">Create Account</button>
        <div id="register-msg" class="msg"></div>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
